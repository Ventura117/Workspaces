<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Project</title>
  <link rel="stylesheet" href="styles/page_frame.css">
  <link rel="stylesheet" href="styles/edit_project_page.css">
</head>
<body>  
  <div class="page-frame-logo">
    Workspaces
  </div>

  <div class="page-frame-title">
    Edit Project
  </div>

  <nav class="page-frame-nav">
    <li class="page-frame-nav-li" onclick="loadPage('home')">Home</li>
    <li class="page-frame-nav-li" onclick="loadPage('tasks')">Tasks</li>
    <li class="page-frame-nav-li-active" onclick="loadPage('projects')">Projects</li>
    <li class="page-frame-nav-li" onclick="loadPage('notes')">Notes</li>
    <li class="page-frame-nav-li" onclick="loadPage('cheatsheet')">Cheatsheet</li>
  </nav>

  <div class="page-frame-content">
    <div class="form-container">
      <div class="field-container">
        <label for="zendesk_id">Zendesk ID:</label>
        <input type="text" id="zendesk_id" placeholder="Enter zendesk id" required>
      </div>

      <div class="field-container">
        <label for="azure_id">Azure ID:</label>
        <input type="text" id="azure_id" placeholder="Enter azure id">
      </div>

      <div class="field-container">
        <label for="status">Status:</label>
        <select id="status">
          <option>Not Started</option>
          <option>In Progress</option>
          <option>On Hold</option>
          <option>Refinement</option>
          <option>Ready for Dev</option>
          <option>In Dev</option>
          <option>Complete</option>
        </select>
      </div>

      <div class="field-container">
        <label for="sponsor">Sponsor:</label>
        <input type="text" id="sponsor" placeholder="Enter sponsor name" required>
      </div>

      <div class="field-container">
        <label for="priority">Priority:</label>
        <select id="priority">
          <option>0</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
        </select>
      </div>

      <div class="field-container">
        <label for="assignee">Assignee:</label>
        <select id="assignee">
          <option>-</option>
          <option>Tony</option>
          <option>Greg</option>
        </select>
      </div>

      <div class="field-container field-container-span2">
        <label for="name">Project Name:</label>
        <input type="text" id="name" placeholder="Enter project name" required>
      </div>

      <div class="field-container">
        <label for="due_date">Due Date:</label>
        <input class="input-date" type="date" id="due_date">
      </div>

      <div class="field-container field-container-span3">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Enter title">
      </div>

      <div class="field-container field-container-span3">
        <label for="description">Description:</label>
        <textarea rows="5" id="description" placeholder="Enter description"></textarea>
      </div>

      <div class="field-container field-container-span3">
        <label for="acceptance">Acceptance Criteria:</label>
        <textarea rows="15" id="acceptance" placeholder="Enter acceptance criteria"></textarea>
      </div>
      <div class="button-container field-container-span3">
        <button type="button" onclick="loadPage('projects')">Cancel</button>
        <button type="submit" onclick="saveDetails()">Save</button>
      </div>
    </div>
  </div>

  <script src="scripts/page_frame.js"></script>
  <script src="scripts/edit_project_page.js"></script>
</body>
</html>
